networks:
  default:
    internal: false
    name: ${NETWORK_NAME}

services:
  traefik:
    image: traefik:3
    restart: ${RESTART}
    command:
      - "--providers.docker"
      - "--providers.docker.exposedByDefault=false"
      - "--api.dashboard=${DASHBOARD}"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      - "--providers.file.directory=/etc/traefik/traefik.d"
      # RES-224 (restaurant-cms): HTTP dynamic provider. The restaurant-cms
      # management plane (homepage) emits one Host(...) router per tenant_domains
      # row so owner-changed custom domains route immediately, without editing
      # static labels. Tolerant of the endpoint being down (Traefik keeps the
      # last-known config and the docker/file routes for other projects).
      - "--providers.http.endpoint=${RCMS_TRAEFIK_PROVIDER_ENDPOINT:-http://restaurant-cms-homepage:3000/internal/traefik/dynamic}"
      - "--providers.http.pollInterval=30s"
      - "--providers.http.headers.Authorization=Bearer ${TRAEFIK_PROVIDER_SECRET:-legion-traefik-provider-secret}"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ${DOCKER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock:ro
      - ./traefik.d:/etc/traefik/traefik.d:ro
      - ./certs:/etc/traefik/certs:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.entrypoints=web"
      - "traefik.http.routers.api.rule=Host(`${HOST}`)"
      - "traefik.http.routers.api.service=api@internal"
